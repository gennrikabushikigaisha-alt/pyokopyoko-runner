<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ぴょこぴょこランナー</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    width: 100%;
    background: #ffe3f1;
    font-family: -apple-system, "Hiragino Maru Gothic ProN", "Hiragino Kaku Gothic ProN", sans-serif;
    overflow: hidden;
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  #game {
    display: block;
    width: 100vw;
    height: 100vh;
    height: 100dvh;
    touch-action: none;
    cursor: pointer;
  }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// ===== レスポンシブ設定 =====
let W, H, unit, GROUND_TOP;
function resize() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = Math.floor(W * dpr);
  canvas.height = Math.floor(H * dpr);
  canvas.style.width = W + "px";
  canvas.style.height = H + "px";
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  unit = Math.min(W, H * 0.62) / 400;      // 基準スケール
  GROUND_TOP = H - Math.max(H * 0.16, 90);  // 地面の上端
  if (player && onGround()) player.y = GROUND_TOP - player.r;
}

// ===== 状態 =====
const STATE = { SELECT: 0, PLAY: 1, OVER: 2 };
let state = STATE.SELECT;
let player, partnerKind, obstacles, hearts, sparks, traveled, score, best, speed, spawnDist, overAt, blink;
best = Number(localStorage.getItem("runnerBest") || 0);
let chosen = localStorage.getItem("runnerChar") || "bunny";

function startGame(kind) {
  chosen = kind;
  partnerKind = kind === "bunny" ? "pig" : "bunny";
  localStorage.setItem("runnerChar", kind);
  player = { x: 0, y: 0, vy: 0, r: 24 * unit, jumps: 2, run: 0 };
  player.x = W * 0.26;
  player.r = clamp(26 * unit, 16, 40);
  player.y = GROUND_TOP - player.r;
  obstacles = [];
  hearts = [];
  sparks = [];
  traveled = 0;
  score = 0;
  speed = 4.2 * unit;
  spawnDist = W * 0.6;
  blink = 0;
  state = STATE.PLAY;
}

function onGround() { return player && player.y >= GROUND_TOP - player.r - 0.5; }
function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }

function jump() {
  if (player.jumps > 0) {
    player.vy = -15.5 * unit;
    player.jumps--;
  }
}

// ===== 入力 =====
function onTap(px) {
  if (state === STATE.SELECT) {
    startGame(px < W / 2 ? "bunny" : "pig");
  } else if (state === STATE.PLAY) {
    jump();
  } else if (state === STATE.OVER) {
    if (perfNow() - overAt > 600) state = STATE.SELECT;
  }
}
let _t = 0;
function perfNow() { return _t; }
canvas.addEventListener("pointerdown", e => { e.preventDefault(); onTap(e.clientX); });
window.addEventListener("keydown", e => {
  if (e.code === "Space" || e.code === "ArrowUp" || e.code === "Enter") {
    e.preventDefault();
    if (state === STATE.SELECT) startGame(chosen);
    else onTap(W / 2);
  }
  if (state === STATE.SELECT && (e.code === "ArrowLeft" || e.code === "ArrowRight")) {
    chosen = e.code === "ArrowLeft" ? "bunny" : "pig";
  }
});

// ===== 生成 =====
function spawnObstacle() {
  const heights = [42, 58, 74, 92];
  const h = heights[Math.floor(Math.random() * heights.length)] * unit;
  const w = clamp(30 * unit, 18, 46);
  obstacles.push({ x: W + w, w, h });
  // ときどきごほうびのハートを障害物の上あたりに
  if (Math.random() < 0.55) {
    hearts.push({ x: W + w + (60 + Math.random() * 80) * unit, y: GROUND_TOP - h - (60 + Math.random() * 70) * unit, got: false, r: 13 * unit });
  }
}

// ===== 更新 =====
function update() {
  _t += 16.7;
  blink = (blink + 1) % 220;

  if (state === STATE.PLAY) {
    speed = Math.min(4.2 * unit + traveled * 0.00018, 9.5 * unit);
    traveled += speed;
    score = Math.floor(traveled / (38 * unit));

    // 物理
    player.vy += 0.78 * unit;
    player.y += player.vy;
    player.run += speed * 0.05;
    if (player.y >= GROUND_TOP - player.r) {
      player.y = GROUND_TOP - player.r;
      player.vy = 0;
      player.jumps = 2;
    }

    // 障害物
    spawnDist -= speed;
    if (spawnDist <= 0) {
      spawnObstacle();
      const minGap = speed * 44;
      spawnDist = Math.max(minGap, (150 + Math.random() * 150) * unit);
    }
    for (const o of obstacles) o.x -= speed;
    obstacles = obstacles.filter(o => o.x + o.w > -10);

    // ハート
    for (const ht of hearts) {
      ht.x -= speed;
      if (!ht.got && Math.hypot(ht.x - player.x, ht.y - player.y) < player.r + ht.r) {
        ht.got = true;
        score += 5;
        for (let i = 0; i < 8; i++) sparks.push({ x: ht.x, y: ht.y, vx: (Math.random() - 0.5) * 4, vy: (Math.random() - 0.5) * 4, life: 1 });
      }
    }
    hearts = hearts.filter(ht => !ht.got && ht.x + ht.r > -10);

    // 当たり判定(すこしやさしめのhitbox)
    const pad = player.r * 0.65;
    for (const o of obstacles) {
      const ot = GROUND_TOP - o.h;
      if (player.x + pad > o.x && player.x - pad < o.x + o.w && player.y + pad > ot) {
        gameOver();
        break;
      }
    }
  }

  // きらきら
  for (const s of sparks) { s.x += s.vx; s.y += s.vy; s.life -= 0.04; }
  sparks = sparks.filter(s => s.life > 0);
}

function gameOver() {
  state = STATE.OVER;
  overAt = perfNow();
  if (score > best) { best = score; localStorage.setItem("runnerBest", best); }
}

// ===== キャラ描画 =====
function drawChar(kind, cx, cy, r, run, isPlayer) {
  ctx.save();
  ctx.translate(cx, cy);
  // 影
  ctx.save();
  ctx.fillStyle = "rgba(150,110,130,0.18)";
  const footH = (GROUND_TOP - (cy + r));
  const shadowScale = clamp(1 - footH / (H * 0.4), 0.4, 1);
  ctx.beginPath();
  ctx.ellipse(0, (GROUND_TOP - cy), r * 0.9 * shadowScale, r * 0.28 * shadowScale, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // あし(走り)
  const legSwing = Math.sin(run) * r * 0.35;
  const grounded = footH < 2;
  const sw = grounded ? legSwing : r * 0.1;
  ctx.fillStyle = kind === "bunny" ? "#f3e0e8" : "#f5a9c4";
  ctx.beginPath(); ctx.ellipse(-r * 0.35 + sw, r * 0.85, r * 0.28, r * 0.2, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(r * 0.35 - sw, r * 0.85, r * 0.28, r * 0.2, 0, 0, Math.PI * 2); ctx.fill();

  if (kind === "bunny") drawBunny(r);
  else drawPig(r);

  ctx.restore();
}

function drawBunny(r) {
  // みみ
  for (const side of [-1, 1]) {
    ctx.save();
    ctx.translate(side * r * 0.42, -r * 0.55);
    ctx.rotate(side * 0.22);
    ctx.fillStyle = "#ffffff";
    ctx.beginPath(); ctx.ellipse(0, -r * 0.85, r * 0.22, r * 0.95, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = "#ffc2dd";
    ctx.beginPath(); ctx.ellipse(0, -r * 0.85, r * 0.1, r * 0.6, 0, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }
  // からだ
  ctx.fillStyle = "#ffffff";
  ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill();
  // ほっぺ
  ctx.fillStyle = "#ffb3d1";
  ctx.beginPath(); ctx.arc(r * 0.55, r * 0.2, r * 0.18, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(-r * 0.35, r * 0.2, r * 0.18, 0, Math.PI * 2); ctx.fill();
  drawFace(r, "#5a3a4a");
  // おはな
  ctx.fillStyle = "#ff7fa8";
  ctx.beginPath(); ctx.arc(r * 0.3, r * 0.12, r * 0.1, 0, Math.PI * 2); ctx.fill();
}

function drawPig(r) {
  // みみ(垂れ)
  ctx.fillStyle = "#f078a6";
  for (const side of [-1, 1]) {
    ctx.beginPath();
    ctx.moveTo(side * r * 0.55, -r * 0.55);
    ctx.lineTo(side * r * 0.9, -r * 0.95);
    ctx.lineTo(side * r * 0.95, -r * 0.4);
    ctx.closePath();
    ctx.fill();
  }
  // からだ
  ctx.fillStyle = "#ffb0cd";
  ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill();
  // ほっぺ
  ctx.fillStyle = "#ff8fb5";
  ctx.beginPath(); ctx.arc(r * 0.6, r * 0.25, r * 0.16, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(-r * 0.3, r * 0.25, r * 0.16, 0, Math.PI * 2); ctx.fill();
  drawFace(r, "#7a4458");
  // はな(おおきめ)
  ctx.fillStyle = "#ff8fb5";
  ctx.beginPath(); ctx.ellipse(r * 0.32, r * 0.15, r * 0.26, r * 0.2, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = "#e06b93";
  ctx.beginPath(); ctx.arc(r * 0.24, r * 0.15, r * 0.05, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(r * 0.42, r * 0.15, r * 0.05, 0, Math.PI * 2); ctx.fill();
}

function drawFace(r, eyeColor) {
  const closed = blink < 8;
  ctx.fillStyle = eyeColor;
  if (closed) {
    ctx.strokeStyle = eyeColor; ctx.lineWidth = r * 0.06;
    ctx.beginPath(); ctx.moveTo(-r * 0.18, -r * 0.12); ctx.lineTo(-r * 0.02, -r * 0.12); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(r * 0.45, -r * 0.12); ctx.lineTo(r * 0.62, -r * 0.12); ctx.stroke();
  } else {
    ctx.beginPath(); ctx.arc(-r * 0.1, -r * 0.1, r * 0.1, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(r * 0.53, -r * 0.1, r * 0.1, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = "#fff";
    ctx.beginPath(); ctx.arc(-r * 0.07, -r * 0.14, r * 0.035, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(r * 0.56, -r * 0.14, r * 0.035, 0, Math.PI * 2); ctx.fill();
  }
}

// ===== 風景 =====
function drawCarrot(o) {
  const cx = o.x + o.w / 2;
  const baseY = GROUND_TOP;
  const tipY = GROUND_TOP - o.h;
  const halfW = o.w / 2;
  const grad = ctx.createLinearGradient(cx - halfW, 0, cx + halfW, 0);
  grad.addColorStop(0, "#ff8a3d"); grad.addColorStop(0.5, "#ffa860"); grad.addColorStop(1, "#ef7a2c");
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.moveTo(cx - halfW, baseY); ctx.lineTo(cx + halfW, baseY); ctx.lineTo(cx, tipY); ctx.closePath();
  ctx.fill();
  // 葉っぱ
  ctx.fillStyle = "#6fc36a";
  for (const off of [-1, 0, 1]) {
    ctx.beginPath();
    ctx.ellipse(cx + off * o.w * 0.28, tipY - 6 * unit, 5 * unit, 13 * unit, off * 0.25, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawHeart(x, y, r) {
  ctx.save();
  ctx.translate(x, y);
  ctx.fillStyle = "#ff6f9d";
  ctx.beginPath();
  ctx.moveTo(0, r * 0.5);
  ctx.bezierCurveTo(r, -r * 0.4, r * 0.4, -r, 0, -r * 0.3);
  ctx.bezierCurveTo(-r * 0.4, -r, -r, -r * 0.4, 0, r * 0.5);
  ctx.fill();
  ctx.restore();
}

function drawWorld() {
  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0, "#ffe3f1"); sky.addColorStop(1, "#d8f0ff");
  ctx.fillStyle = sky; ctx.fillRect(0, 0, W, H);

  // 雲
  ctx.fillStyle = "rgba(255,255,255,0.75)";
  const cloudShift = (state === STATE.PLAY) ? traveled * 0.12 : _t * 0.01;
  for (let i = 0; i < 4; i++) {
    const cx = ((i * (W / 3 + 40) - cloudShift) % (W + 120) + W + 120) % (W + 120) - 60;
    const cy = H * 0.12 + i * H * 0.07;
    ctx.beginPath();
    ctx.arc(cx, cy, 18 * unit, 0, Math.PI * 2);
    ctx.arc(cx + 22 * unit, cy, 24 * unit, 0, Math.PI * 2);
    ctx.arc(cx + 46 * unit, cy, 16 * unit, 0, Math.PI * 2);
    ctx.fill();
  }

  // 地面
  ctx.fillStyle = "#cdeeb0"; ctx.fillRect(0, GROUND_TOP, W, H - GROUND_TOP);
  ctx.fillStyle = "#aee08a"; ctx.fillRect(0, GROUND_TOP, W, 8 * unit);
  // お花
  const flowShift = (state === STATE.PLAY ? traveled : _t * 0.06);
  for (let x = (-flowShift % (60 * unit)); x < W; x += 60 * unit) {
    const fy = GROUND_TOP + 32 * unit;
    ctx.fillStyle = "#ffd9ec";
    for (let a = 0; a < 5; a++) {
      const ang = (a / 5) * Math.PI * 2;
      ctx.beginPath();
      ctx.arc(x + Math.cos(ang) * 4 * unit, fy + Math.sin(ang) * 4 * unit, 2.4 * unit, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.fillStyle = "#ffe98a";
    ctx.beginPath(); ctx.arc(x, fy, 2 * unit, 0, Math.PI * 2); ctx.fill();
  }
}

function drawText(text, y, size, color, align) {
  ctx.fillStyle = color || "#fff";
  ctx.font = `bold ${size}px sans-serif`;
  ctx.textAlign = align || "center";
  ctx.lineWidth = size * 0.12;
  ctx.strokeStyle = "rgba(214,120,160,0.5)";
  ctx.strokeText(text, align === "left" ? 20 : W / 2, y);
  ctx.fillText(text, align === "left" ? 20 : W / 2, y);
}

// ===== 画面 =====
function draw() {
  drawWorld();

  if (state === STATE.SELECT) {
    drawText("ぴょこぴょこランナー", H * 0.2, clamp(34 * unit, 22, 40), "#ff5e93");
    drawText("いっしょに走る子をえらんでね", H * 0.27, clamp(17 * unit, 13, 20), "#a86b86");
    const cy = H * 0.5, cr = clamp(50 * unit, 34, 70);
    // うさぎ(左)
    drawChar("bunny", W * 0.3, cy, cr, 0, false);
    drawText("うさぎちゃん", cy + cr * 1.7, clamp(20 * unit, 14, 24), "#ff7fa8");
    // ぶた(右)
    drawChar("pig", W * 0.7, cy, cr, 0, false);
    drawText("ぶたさん", cy + cr * 1.7, clamp(20 * unit, 14, 24), "#ff7fa8");
    drawText("▲ タップでスタート ▲", H * 0.82, clamp(18 * unit, 13, 22), "#a86b86");
    return;
  }

  // 仲間(うしろを走る、当たり判定なし)
  const pr = player.r * 0.78;
  const pbob = Math.abs(Math.sin(player.run * 1.1)) * pr * 0.3;
  drawChar(partnerKind, player.x - player.r * 3.2, GROUND_TOP - pr - pbob, pr, player.run * 1.1, false);

  obstacles.forEach(drawCarrot);
  hearts.forEach(ht => { if (!ht.got) drawHeart(ht.x, ht.y, ht.r); });

  drawChar(chosen, player.x, player.y, player.r, player.run, true);

  // きらきら
  for (const s of sparks) {
    ctx.globalAlpha = Math.max(0, s.life);
    ctx.fillStyle = "#fff0a0";
    ctx.beginPath(); ctx.arc(s.x, s.y, 3 * unit, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  drawText("スコア " + score, H * 0.08, clamp(26 * unit, 18, 30), "#ff5e93", "left");
  drawText("ベスト " + best, H * 0.13, clamp(16 * unit, 12, 20), "#a86b86", "left");

  if (state === STATE.OVER) {
    ctx.fillStyle = "rgba(255,180,205,0.5)"; ctx.fillRect(0, 0, W, H);
    drawText("おつかれさま♡", H * 0.4, clamp(34 * unit, 24, 42), "#ff5e93");
    drawText("スコア " + score, H * 0.5, clamp(24 * unit, 18, 28), "#fff");
    drawText("ベスト " + best, H * 0.56, clamp(20 * unit, 14, 24), "#fff3b0");
    drawText("タップでもう一回", H * 0.66, clamp(18 * unit, 13, 22), "#fff");
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

window.addEventListener("resize", resize);
resize();
loop();
</script>
</body>
</html>
